site_name: Super-Brain
site_description: "MEDHIRA - Local multimodal graph-intelligence system"
site_url: https://agsuperbrain.readthedocs.io
site_author: MEDHIRA

repo_url: https://github.com/HELLOMEDHIRA/agsuperbrain
repo_name: HELLOMEDHIRA/agsuperbrain

theme:
  name: material
  logo: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  favicon: https://raw.githubusercontent.com/HELLOMEDHIRA/medhira/main/assets/medhira-logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
  features:
    - navigation.integrated
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - footnotes
  - meta
  - tables
  - attr_list
  - def_list
  - md_in_html

nav:
  - Home: index.md
  - Install: install.md
  - Quick Start: quickstart.md
  - Why Super-Brain: comparison.md
  - CLI Reference: cli.md
  - IDE Integration: mcp.md
  - Architecture: architecture.md
  - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HELLOMEDHIRA/agsuperbrain

  copyright: "Copyright &copy; 2024 MEDHIRA. Apache License 2.0."